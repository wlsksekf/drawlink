version: '3.8'

services:
  backend:
    image: ${DOCKER_USERNAME:-drawlink}/${BACKEND_IMAGE:-backend}:latest
    build:
      context: ./backend
      dockerfile: ./backend/Dockerfile
    container_name: drawlink-backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    networks:
      - global-network
    restart: always

  frontend:
    image: ${DOCKER_USERNAME:-drawlink}/${FRONTEND_IMAGE:-frontend}:latest
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: drawlink-frontend
    depends_on:
      - backend
    networks:
      - global-network
    restart: always

networks:
  global-network:
    external: true