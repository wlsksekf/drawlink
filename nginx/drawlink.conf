server {
    listen 80;
    server_name drawlink.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name drawlink.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/drawlink.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drawlink.duckdns.org/privkey.pem;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 도커 내부 DNS 지정
    resolver 127.0.0.11 valid=30s;

    location / {
        set $dl_front "http://drawlink-frontend:80";
        proxy_pass $dl_front;
    }

    location /api/ {
        set $dl_back "http://drawlink-backend:8000";
        proxy_pass $dl_back;
    }

    location /ws/ {
        set $dl_ws "http://drawlink-backend:8000";
        proxy_pass $dl_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_buffering off;
    }
}