# 🔹 프록시 기본 헤더 설정
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# 1️⃣ HTTP(80) -> HTTPS(443) 자동 리다이렉트
server {
    listen 80;
    server_name drawlink.duckdns.org;
    return 301 https://$host$request_uri;
}

# 2️⃣ 정식 HTTPS + 웹소켓 통합 라우팅 (정석 버전)
server {
    listen 443 ssl;
    server_name drawlink.duckdns.org;

    # Let's Encrypt 인증서 경로
    ssl_certificate /etc/letsencrypt/live/drawlink.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drawlink.duckdns.org/privkey.pem;

    # 프론트엔드 컨테이너 라우팅
    location / {
        proxy_pass http://drawlink-frontend:80;
    }

    # 백엔드 API & 웹소켓(wss) 통합 라우팅
    # (FastAPI 백엔드가 /api/ws/... 로 주소를 열기 때문에 이 블록 하나로 전부 처리 가능)
    location /api/ {
        proxy_pass http://drawlink-backend:8000;

        # 웹소켓 양방향 핸드셰이크 프로토콜 전환 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # 실시간 통신을 위한 버퍼링 해제 및 타임아웃 연장
        proxy_buffering off;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        proxy_connect_timeout 7200s;
    }
}