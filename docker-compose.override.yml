version: '3.8'

services:
  # Scale down nginx to 0 locally to prevent Let's Encrypt directory errors
  nginx:
    scale: 0

  # Expose frontend container port 80 directly to host for debugging
  frontend:
    ports:
      - "80:80"

  # Expose backend container port 8000 for direct API and socket testing
  backend:
    ports:
      - "8000:8000"
