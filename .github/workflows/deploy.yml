name: Build and Deploy to Oracle Cloud VM

on:
  workflow_dispatch:

env:
  BACKEND_IMAGE: drawlink-backend
  FRONTEND_IMAGE: drawlink-frontend
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  # 1단계: 빌드 작업 (Docker Hub에 이미지 빌드 및 푸시)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 백엔드 이미지 빌드 및 푸시
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest

      # 프론트엔드 이미지 빌드 및 푸시 (Vite 빌드 인수 주입)
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest

  # 2단계: 배포 작업 (오라클 VM에 접속하여 최신 이미지 pull 후 재가동)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # docker-compose.yml 및 nginx.conf 파일 전송
      - name: Transfer config files to Oracle VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/home/${{ secrets.SERVER_USER }}/drawlink"

      # SSH 원격 접속 및 가동 스크립트 실행
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.SERVER_USER }}/drawlink
            
            # 1. GitHub Secrets에 등록한 DOT_ENV 값을 기반으로 .env 파일 생성
            echo "${{ secrets.DOT_ENV }}" > .env
            
            # 2. .env 파일에 Docker 관련 변수 추가
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            echo "BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}" >> .env
            echo "FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}" >> .env
            
            # 3. Certbot용 디렉토리를 opc/ubuntu 계정 권한으로 사전 생성하여 권한/마운트 이슈 예방
            mkdir -p certbot-data/conf certbot-data/www
            
            # 서버에서 Docker Hub 인증 토큰으로 로그인
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # 기존 컨테이너 정지 및 리소스 확보
            docker compose down --remove-orphans
            docker container prune -f
            docker image prune -a -f
            
            # Docker Hub로부터 최신 빌드 이미지 다운로드 및 가동
            docker compose pull
            docker compose up -d
