# ==============================================================================
# DrawLink 최상단 독립 Nginx Gateway 설정 (최초 1차 배포용: HTTP 전용 및 Certbot 연동)
# ==============================================================================

# 1. HTTP (80 포트) - 서비스 제공 및 Let's Encrypt 인증서 발급 검증 지원
server {
    listen 80;
    listen [::]:80;
    server_name drawlink.duckdns.org localhost;

    # Certbot SSL 인증서 갱신용 검증 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 기본 요청 -> 프론트엔드 컨테이너 내부 웹서버 중계
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 백엔드 API 요청 -> 백엔드 FastAPI 컨테이너 중계
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # 백엔드 실시간 WebSocket 요청 -> 백엔드 FastAPI 컨테이너 WebSocket 중계
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

