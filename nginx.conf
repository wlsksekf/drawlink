# ==============================================================================
# DrawLink 최상단 독립 Nginx Gateway 설정 (리버스 프록시 및 SSL 지원)
# ==============================================================================

# 1. HTTP (80 포트) - Let's Encrypt 인증서 갱신 지원 및 HTTPS 강제 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name drawlink.duckdns.org localhost;

    # Certbot SSL 인증서 갱신용 검증 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 모든 HTTP 일반 요청은 안전한 HTTPS 보안 프로토콜로 영구 업그레이드 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS (443 포트) - 정식 운영 배포용 SSL 서버 블록
# [최초 배포 시 주의사항]
# 최초 배포 시 Let's Encrypt 인증서가 발급되기 전에는 아래 ssl_certificate 경로에 파일이 없어
# Nginx 컨테이너 기동이 실패합니다. 따라서 최초 배포 시에는 아래 HTTPS 블록 전체를 주석처리하고
# 배포한 뒤, Certbot 인증서 발급에 성공하면 주석을 제거하고 Nginx를 리로드(nginx -s reload)해주세요.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name drawlink.duckdns.org;

    # 발급된 Let's Encrypt 실물 인증서 볼륨 파일 매핑 로드
    ssl_certificate /etc/letsencrypt/live/drawlink.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drawlink.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 기본 요청 -> 프론트엔드 컨테이너 내부 웹서버 중계
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 백엔드 API 요청 -> 백엔드 FastAPI 컨테이너 중계
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # 백엔드 실시간 WebSocket 요청 -> 백엔드 FastAPI 컨테이너 WebSocket 중계
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
